<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TippLiga VM 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00C16A;--green-dark:#007A40;--gold:#FFD700;--red:#E63946;
  --bg:#0A0F0D;--surface:#111A14;--card:#162019;--border:#1E2E22;
  --text:#E8F0EA;--muted:#6B8A72;--accent:#00FF87;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* HEADER */
.hero-header{background:linear-gradient(135deg,#0A1F0E 0%,#061A0B 60%,#0D2010 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hero-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);line-height:1}
.logo span{color:var(--gold)}
.login-btn{background:var(--green);color:#000;border:none;padding:7px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;cursor:pointer}
.login-btn:hover{background:var(--accent)}
.user-badge{display:flex;align-items:center;gap:7px;font-size:12px}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--green-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--accent);flex-shrink:0}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.clock{font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;text-align:right;line-height:1.4}
.clock span{color:var(--accent);font-weight:600}
/* MAIN NAV */
.main-nav{display:flex;gap:0;padding:0 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.main-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;transition:all .2s}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tab:hover{color:var(--text)}
/* STAGE NAV */
.stage-nav{display:flex;gap:4px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)}
.stage-nav::-webkit-scrollbar{display:none}
.stage-tab{padding:5px 12px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:16px;border:1px solid var(--border);white-space:nowrap;background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
.stage-tab.active{background:var(--green-dark);border-color:var(--green);color:var(--accent)}
.stage-tab:hover:not(.locked){color:var(--text)}
.stage-tab.locked{opacity:.35;cursor:not-allowed}
/* PRE SUB NAV */
.pre-sub-nav{display:flex;gap:4px;padding:6px 14px;background:#0d1a10;border-bottom:1px solid var(--border)}
.pre-sub-btn{padding:4px 14px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:14px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
.pre-sub-btn.active{background:var(--green-dark);border-color:var(--green);color:var(--accent)}
/* PAGES */
.page{display:none;padding:12px 16px;max-width:900px;margin:0 auto}
.page.active{display:block}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px}
/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;transition:background .15s}
.lb-row:hover{background:var(--surface)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;width:26px;text-align:center;color:var(--muted)}
.lb-rank.gold{color:var(--gold)}.lb-rank.silver{color:#C0C0C0}.lb-rank.bronze{color:#CD7F32}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}
/* MATCH CARDS */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.match-card:hover{border-color:var(--green)}
.score{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--text);line-height:1;text-align:center;min-width:70px}
.score.live-score{color:var(--accent)}
.score.ongoing{color:var(--gold)}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:#1a2e1a;border:1px solid var(--green);color:var(--green);padding:3px 9px;border-radius:16px;font-size:10px;font-weight:600;margin-bottom:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-close-btn{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);margin-bottom:4px}
.tip-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.tip-row:last-child{border-bottom:none}
.tip-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);min-width:55px;text-align:center}
.tip-pts-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--green-dark);color:var(--accent)}
.tip-pts-badge.zero{background:var(--surface);color:var(--muted)}
/* TIP FORM */
.tip-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}
.score-inputs{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 8px}
.score-inputs input[type=number]{width:56px;height:48px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:28px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;outline:none}
.score-inputs input[type=number]:focus{border-color:var(--green)}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted)}
.player-select-wrap{position:relative;flex:1;min-width:130px}
.player-search{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.player-search:focus{border-color:var(--green)}
.player-search::placeholder{color:var(--muted)}
.player-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:300;display:none;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.player-dropdown.open{display:block}
.player-group-label{padding:5px 9px 2px;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;background:var(--surface);position:sticky;top:0}
.player-option{padding:6px 9px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.player-option:last-child{border-bottom:none}
.player-option:hover{background:var(--green-dark);color:var(--accent)}
.pos-badge{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:5px;font-weight:700}
.pos-GK{background:#1a2a3a;color:#5ba3d9}.pos-DEF{background:#1a2a1a;color:#5bd95b}
.pos-MID{background:#2a2a1a;color:#d9c45b}.pos-FWD{background:#2a1a1a;color:#d95b5b}
.team-select{flex:1;min-width:120px;padding:7px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.booster-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.booster-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif}
.booster-btn.b-x2.active{background:#2a2000;border-color:var(--gold);color:var(--gold)}
.booster-btn.b-goal.active{background:var(--green-dark);border-color:var(--green);color:var(--accent)}
.booster-btn:disabled{opacity:.25;cursor:not-allowed}
.save-btn{width:100%;padding:9px;background:var(--green);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.save-btn:hover{background:var(--accent)}
.saved-badge{text-align:center;padding:5px;font-size:11px;color:var(--green)}
/* PRE TIPS */
.group-tip-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.group-tip-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);margin-bottom:8px}
.group-rank-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.rank-label{font-size:11px;color:var(--muted);width:16px;text-align:center;font-weight:600}
.group-select{flex:1;padding:6px 9px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
/* GROUP TABLE */
.group-table{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.group-table-header{background:var(--surface);padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--accent)}
.group-table-row{display:grid;grid-template-columns:24px 1fr 30px 30px 30px 30px 34px;gap:4px;padding:7px 12px;border-top:1px solid var(--border);font-size:12px;align-items:center}
.group-table-row.hdr{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.gt-pos{color:var(--muted);font-weight:700;text-align:center}
.gt-pos.qual{color:var(--accent)}
.gt-pts-cell{font-weight:700;color:var(--accent);text-align:center}
/* PLAYER MODAL (pre-tips) */
.player-tip-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;margin:4px;transition:border-color .2s}
.player-tip-chip:hover{border-color:var(--green);color:var(--accent)}
/* ADMIN */
.admin-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px}
.admin-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.admin-row{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;margin-bottom:7px}
.admin-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.admin-input{padding:6px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.admin-input:focus{border-color:var(--green)}
.admin-btn{padding:7px 13px;background:var(--green-dark);border:none;color:var(--accent);border-radius:6px;cursor:pointer;font-weight:600;font-size:11px;font-family:'DM Sans',sans-serif}
.admin-btn:hover{background:var(--green);color:#000}
.admin-btn.danger{background:#2a0a0a;color:var(--red);border:1px solid #4a1010}
.warn-box{background:#1a0f00;border:1px solid #4a2800;border-radius:8px;padding:10px;font-size:11px;color:#cc8800;margin-bottom:10px}
.locked-notice{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center;color:var(--muted);font-size:13px;margin-top:16px}
/* LOGIN MODAL */
.login-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000}
.login-modal-overlay.show{display:flex}
.login-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:300px;max-width:92vw}
.login-modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);margin-bottom:16px}
.login-modal input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:8px}
.login-modal input:focus{border-color:var(--green)}
.login-modal-btn{width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.login-modal-err{color:var(--red);font-size:11px;margin-bottom:7px;display:none}
.modal-close-x{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;margin-top:-3px}
/* SETUP */
.setup-screen{max-width:560px;margin:36px auto;padding:18px}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
.setup-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);margin-bottom:5px}
.setup-step{background:var(--surface);border-radius:9px;padding:12px;margin-bottom:9px;font-size:12px}
.setup-step h3{color:var(--text);font-size:12px;margin-bottom:4px;font-weight:600}
.setup-input-row{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap}
.setup-input{flex:1;min-width:160px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:11px;font-family:monospace;outline:none}
.setup-input:focus{border-color:var(--green)}
.setup-btn{padding:8px 16px;background:var(--green);color:#000;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.setup-err{color:var(--red);font-size:11px;margin-top:5px;display:none}
@media(max-width:500px){.logo{font-size:20px}.score{font-size:26px}.score-inputs input[type=number]{width:48px;height:44px;font-size:24px}.nav-tab{padding:8px 10px;font-size:12px}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen" class="setup-screen" style="display:none">
  <div class="setup-card">
    <div class="setup-title">⚙️ Konfigurera TippLigan</div>
    <p style="color:var(--muted);font-size:12px;margin-bottom:16px">Koppla till Supabase.</p>
    <div class="setup-step"><h3>Supabase URL & nyckel</h3>
      <div class="setup-input-row">
        <input class="setup-input" id="cfgUrl" placeholder="https://xxxx.supabase.co">
        <input class="setup-input" id="cfgKey" placeholder="anon key">
      </div>
    </div>
    <div style="margin-top:8px"><button class="setup-btn" onclick="saveConfig()">Spara & Anslut</button></div>
    <div class="setup-err" id="setupErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">

<!-- LOGIN MODAL -->
<div class="login-modal-overlay" id="loginModal">
  <div class="login-modal">
    <button class="modal-close-x" onclick="closeLogin()">✕</button>
    <div class="login-modal-title">Logga in</div>
    <div class="login-modal-err" id="loginErr">Fel användarnamn eller lösenord.</div>
    <input type="text" id="loginUser" placeholder="Användarnamn" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Lösenord" autocomplete="current-password">
    <button class="login-modal-btn" onclick="doLogin()">Logga in</button>
  </div>
</div>

<!-- MATCH DETAIL MODAL -->
<div class="modal-overlay" id="matchModal">
  <div class="modal-sheet">
    <button class="modal-close-btn" onclick="closeMatchModal()">✕</button>
    <div id="matchModalContent"></div>
  </div>
</div>

<!-- PLAYER PRE-TIP MODAL -->
<div class="modal-overlay" id="playerModal">
  <div class="modal-sheet">
    <button class="modal-close-btn" onclick="closePlayerModal()">✕</button>
    <div id="playerModalContent"></div>
  </div>
</div>

<div class="hero-header">
  <div class="hero-top">
    <div class="logo">TippLiga <span>VM 2026</span></div>
    <div class="clock" id="clockEl"><span id="clockTime">00:00:00</span><br>Stockholm (UTC+2)</div>
    <div id="authArea"><button class="login-btn" onclick="openLogin()">Logga in</button></div>
  </div>
  <nav class="main-nav" id="mainNav">
    <button class="nav-tab active" onclick="showPage('main',this)">🏆 Huvudtabell</button>
    <button class="nav-tab" onclick="showPage('stages',this)">📊 Stages</button>
    <button class="nav-tab" id="tipTab" style="display:none" onclick="showPage('tip',this)">✏️ Tippa</button>
    <button class="nav-tab" onclick="showPage('info',this)">📖 Regler</button>
    <button class="nav-tab" id="adminTab" style="display:none" onclick="showPage('admin',this)">⚙️ Admin</button>
  </nav>
</div>

<!-- Stage nav (stages page) -->
<div class="stage-nav" id="stageNav" style="display:none">
  <button class="stage-tab active" id="stab-pre" onclick="setStage('pre',this)">Pre-turnering</button>
  <button class="stage-tab" id="stab-g1" onclick="setStage('g1',this)">Matchday 1</button>
  <button class="stage-tab" id="stab-g2" onclick="setStage('g2',this)">Matchday 2</button>
  <button class="stage-tab" id="stab-g3" onclick="setStage('g3',this)">Matchday 3</button>
  <button class="stage-tab" id="stab-r32" onclick="setStage('r32',this)">R32</button>
  <button class="stage-tab locked" id="stab-r16">R16 🔒</button>
  <button class="stage-tab locked" id="stab-qf">Kvart 🔒</button>
  <button class="stage-tab locked" id="stab-sf">Semi 🔒</button>
  <button class="stage-tab locked" id="stab-final">Final 🔒</button>
</div>

<!-- PRE SUB NAV -->
<div class="pre-sub-nav" id="preSubNav" style="display:none">
  <button class="pre-sub-btn active" id="presub-questions" onclick="setPreSub('questions',this)">🏆 Turneringsfrågor</button>
  <button class="pre-sub-btn" id="presub-groups" onclick="setPreSub('groups',this)">📊 Gruppställningar</button>
</div>

<!-- TIP STAGE NAV (when on tip page) -->
<div class="stage-nav" id="tipStageNav" style="display:none">
  <button class="stage-tab" id="tstab-tournament" onclick="setTipStage('tournament',this)">🏆 Turneringsfrågor</button>
  <button class="stage-tab" id="tstab-groups" onclick="setTipStage('groups',this)">🌍 Grupptippning</button>
  <button class="stage-tab active" id="tstab-g1" onclick="setTipStage('g1',this)">Matchday 1</button>
  <button class="stage-tab" id="tstab-g2" onclick="setTipStage('g2',this)">Matchday 2</button>
  <button class="stage-tab" id="tstab-g3" onclick="setTipStage('g3',this)">Matchday 3</button>
  <button class="stage-tab" id="tstab-r32" onclick="setTipStage('r32',this)">R32</button>
  <button class="stage-tab locked" id="tstab-r16">R16 🔒</button>
  <button class="stage-tab locked" id="tstab-qf">Kvart 🔒</button>
  <button class="stage-tab locked" id="tstab-sf">Semi 🔒</button>
  <button class="stage-tab locked" id="tstab-final">Final 🔒</button>
</div>

<div class="page active" id="page-main"><div style="margin-bottom:12px"></div><div class="section-title">Huvudtabell</div><div id="mainLbContent"></div></div>
<div class="page" id="page-stages"><div style="margin-bottom:12px"></div><div id="stagesContent"></div></div>
<div class="page" id="page-tip"><div style="margin-bottom:12px"></div><div id="tipContent"></div></div>
<div class="page" id="page-pretip" style="display:none!important"><div id="pretipContent"></div></div>
<div class="page" id="page-groupstandings"><div style="margin-bottom:12px"></div><div class="section-title">Gruppställningar</div><div id="groupStandingsContent"></div></div>
<div class="page" id="page-info"><div style="margin-bottom:12px"></div><div id="infoContent"></div></div>
<div class="page" id="page-admin">
  <div style="margin-bottom:12px"></div>
  <div class="warn-box">⚠️ Adminläge</div>
  <div class="stage-nav" id="adminStageNav" style="flex-wrap:wrap">
    <button class="stage-tab active" id="astab-g1" onclick="setAdminStage('g1',this)">Matchday 1</button>
    <button class="stage-tab" id="astab-g2" onclick="setAdminStage('g2',this)">Matchday 2</button>
    <button class="stage-tab" id="astab-g3" onclick="setAdminStage('g3',this)">Matchday 3</button>
    <button class="stage-tab" id="astab-groups" onclick="setAdminStage('groups',this)">📊 Grupper</button>
    <button class="stage-tab" id="astab-r32" onclick="setAdminStage('r32',this)">R32</button>
    <button class="stage-tab locked" id="astab-r16">R16 🔒</button>
    <button class="stage-tab locked" id="astab-qf">Kvart 🔒</button>

async function loadAll(){

  refreshAll();
}
async function loadMatches(){const{data}=await sb.from('matches').select('*').order('deadline');if(data)matches=data.filter(m=>m.id!=='test_fra_civ');}
async function loadTips(){
  const{data}=await sb.from('tips').select('*');tips={};
  if(data)for(const t of data){
    if(!tips[t.match_id])tips[t.match_id]={};
    tips[t.match_id][t.user_id]={home:t.home_score!=null?String(t.home_score):'',away:t.away_score!=null?String(t.away_score):'',scorer:t.scorer||'',first_team:t.first_team||'',booster:t.booster||null};
  }
}
async function loadPreTips(){
  const{data}=await sb.from('pre_tips').select('*');preTips={};
  if(data)for(const r of data){let g={};try{if(r.groups)g=JSON.parse(r.groups);}catch(e){}preTips[r.user_id]={winner:r.winner||'',topscorer:r.topscorer||'',groups:g};}
}
async function loadStagePoints(){
  try{const{data}=await sb.from('settings').select('value').eq('key','stage_points').single();if(data)stagePoints=JSON.parse(data.value||'{}');}catch(e){stagePoints={};}
}
async function loadPlayers(){
  let all=[],from=0,chunk=1000;
  while(true){
    const{data}=await sb.from('players').select('*').order('position').order('name').range(from,from+chunk-1);
    if(!data||!data.length)break;
    all=all.concat(data);
    if(data.length<chunk)break;
    from+=chunk;
  }
  players={};
  for(const p of all){if(!players[p.team])players[p.team]={GK:[],DEF:[],MID:[],FWD:[]};players[p.team][p.position].push(p.name);}
}
async function loadSettings(){
  try{
    const{data}=await sb.from('settings').select('*');
    if(data)for(const r of data){
      if(r.key==='tournament_winner')settings.winner=r.value||'';
      if(r.key==='tournament_topscorer')settings.topscorer=r.value||'';
      if(r.key==='tournament_groups')try{settings.groups=JSON.parse(r.value)||{};}catch(e){}
      if(r.key==='current_standings')try{settings.current_standings=JSON.parse(r.value)||{};}catch(e){}
      if(r.key==='stage_points')try{stagePoints=JSON.parse(r.value)||{};}catch(e){}
    }
  }catch(e){}
}
function setupRealtime(){
  sb.channel('tl_v7')
    .on('postgres_changes',{event:'*',schema:'public',table:'matches'},async()=>{await loadMatches();refreshCurrentPage();})
    .on('postgres_changes',{event:'*',schema:'public',table:'tips'},async()=>{await loadTips();refreshCurrentPage();})
    .on('postgres_changes',{event:'*',schema:'public',table:'pre_tips'},async()=>{await loadPreTips();refreshCurrentPage();})
    .on('postgres_changes',{event:'*',schema:'public',table:'settings'},async()=>{await loadStagePoints();await loadSettings();refreshCurrentPage();})
    .subscribe();
}

// ── POINTS ──
const stripFlag=s=>s.replace(/[\u{1F1E0}-\u{1F1FF}\u{1F3F4}\uFFF0-\uFFFF\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0073}\u{E0063}\u{E0074}\u{E007F}]+/gu,'').trim();
function calcMatchPoints(match,tip,allTips){
  if(!match.result||!tip)return{total:0,bd:[]};
  const[rh,ra]=match.result.split('-').map(Number);
  if(isNaN(rh)||isNaN(ra))return{total:0,bd:[]};
  const th=tip.home===''||tip.home==null?0:parseInt(tip.home);
  const ta=tip.away===''||tip.away==null?0:parseInt(tip.away);
  if(isNaN(th)||isNaN(ta))return{total:0,bd:[]};
  let pts=0;const bd=[];
  const rOut=rh>ra?'H':rh<ra?'A':'D',tOut=th>ta?'H':th<ta?'A':'D';
  if(rOut===tOut){
    pts+=PTS.OUTCOME;bd.push('Rätt utfall +'+PTS.OUTCOME);
    const cc=Object.values(allTips||{}).filter(t2=>{const h=parseInt(t2.home),a=parseInt(t2.away);if(isNaN(h)||isNaN(a))return false;return(h>a?'H':h<a?'A':'D')===rOut;}).length;
    if(cc===1){pts+=PTS.UNDERDOG;bd.push('Underdog! +'+PTS.UNDERDOG);}
  }
  if(th===rh){pts+=PTS.HOME_GOALS;bd.push('Hemmamål +'+PTS.HOME_GOALS);}
  if(ta===ra){pts+=PTS.AWAY_GOALS;bd.push('Bortamål +'+PTS.AWAY_GOALS);}
  if((th-ta)===(rh-ra)){pts+=PTS.GOAL_DIFF;bd.push('Målskillnad +'+PTS.GOAL_DIFF);}
  const noGoals=rh===0&&ra===0;
  if(tip.scorer&&match.pot_scorer){
    const ts=tip.scorer==='__ingen__'?'__ingen__':(tip.scorer||'').toLowerCase();
    const as=noGoals&&!match.pot_scorer?'__ingen__':match.pot_scorer?match.pot_scorer.toLowerCase():'';
    if(ts===as){pts+=PTS.SCORER;bd.push('Målskytt +'+PTS.SCORER);}
  }
  if(tip.first_team&&match.pot_first_team!==undefined){
    const tt=tip.first_team==='__ingetlag__'?'__ingetlag__':tip.first_team.toLowerCase();
    const at=noGoals&&!match.pot_first_team?'__ingetlag__':match.pot_first_team?match.pot_first_team.toLowerCase():'';
    if(tt&&at&&tt===at){pts+=PTS.FIRST_TEAM;bd.push('Första lag +'+PTS.FIRST_TEAM);}
  }
  if(tip.booster==='x2'){pts*=2;bd.push('2X!');}
  if(tip.booster==='goal'){const g=rh+ra;pts+=g;bd.push('Goal +'+g);}
  return{total:pts,bd};
}
function getStageMatchPoints(uid,stage){
  return matches.filter(m=>m.stage===stage&&m.result).reduce((s,m)=>s+calcMatchPoints(m,(tips[m.id]||{})[uid],tips[m.id]||{}).total,0);
}
function getStageMatchPointsWithLive(uid,stage){
  return matches.filter(m=>m.stage===stage&&(m.result||m.live_score)).reduce((s,m)=>{
    const effectiveMatch=m.result?m:Object.assign({},m,{result:m.live_score,pot_scorer:m.live_scorer||null,pot_first_team:m.live_first_team||null});
    return s+calcMatchPoints(effectiveMatch,(tips[m.id]||{})[uid],tips[m.id]||{}).total;
  },0);
}
function getTournamentBonus(uid){
  const pt=preTips[uid]||{};let pts=0;
  if(pt.winner&&settings.winner&&pt.winner.toLowerCase()===settings.winner.toLowerCase())pts+=PTS.WINNER;
  if(pt.topscorer&&settings.topscorer&&pt.topscorer.toLowerCase()===settings.topscorer.toLowerCase())pts+=PTS.TOPSCORER;
  return pts;
}
function getGroupPlacementPoints(uid){
  const pt=preTips[uid]||{};let pts=0;
  const ag=settings.groups||{};
  for(const grp of Object.keys(GROUPS)){
    const actual=ag[grp]||[],tipped=(pt.groups||{})[grp]||[];
    for(let i=0;i<4;i++){if(actual[i]&&tipped[i]&&actual[i].toLowerCase()===tipped[i].toLowerCase())pts+=PTS.GROUP_PLACE;}
  }
  return pts;
}
function getFinalizedStageBonus(uid){let tot=0;for(const s of STAGES){if(stagePoints[s]&&stagePoints[s][uid])tot+=stagePoints[s][uid];}return tot;}
function getMainLeaderboardPoints(uid){return getFinalizedStageBonus(uid)+getTournamentBonus(uid);}
function applySharedRanking(sorted){
  const result=[];let i=0;
  while(i<sorted.length){
    let j=i;while(j<sorted.length&&sorted[j].pts===sorted[i].pts)j++;
    const bonus=Array.from({length:j-i},(_,k)=>RANK_BONUS[i+k]||0).reduce((a,b)=>a+b,0)/(j-i);
    for(let k=i;k<j;k++)result.push({uid:sorted[k].uid,pts:sorted[k].pts,rank:i+1,bonus,outcomes:sorted[k].outcomes||0,exact:sorted[k].exact||0,pos1:sorted[k].pos1||0,pos2:sorted[k].pos2||0,pos3:sorted[k].pos3||0,pos4:sorted[k].pos4||0});
    i=j;
  }
  return result;
}
function getLiveStageMatchPoints(uid,stage){
  // Points from matches with results (final)
  const finalPts=matches.filter(m=>m.stage===stage&&m.result).reduce((s,m)=>s+calcMatchPoints(m,(tips[m.id]||{})[uid],tips[m.id]||{}).total,0);
  return finalPts;
}
function hasOngoingMatch(stage){
  const now=new Date();
  return matches.some(m=>m.stage===stage&&!m.result&&m.live_score&&now>=new Date(m.deadline));
}
function countStageOutcomes(uid,stage){
  return matches.filter(m=>{
    if(m.stage!==stage||!m.result)return false;
    const t=(tips[m.id]||{})[uid];
    if(!t||t.home===''||t.away==='')return false;
    const[rh,ra]=m.result.split('-').map(Number);
    const th=t.home===''||t.home==null?0:parseInt(t.home);
    const ta=t.away===''||t.away==null?0:parseInt(t.away);
    if(isNaN(rh)||isNaN(ra)||isNaN(th)||isNaN(ta))return false;
    return(rh>ra?'H':rh<ra?'A':'D')===(th>ta?'H':th<ta?'A':'D');
  }).length;
}
function countStageExact(uid,stage){
  return matches.filter(m=>{
    if(m.stage!==stage||!m.result)return false;
    const t=(tips[m.id]||{})[uid];
    if(!t||t.home===''||t.away==='')return false;
    const[rh,ra]=m.result.split('-').map(Number);
    const th=t.home===''||t.home==null?0:parseInt(t.home);
    const ta=t.away===''||t.away==null?0:parseInt(t.away);
    return th===rh&&ta===ra;
  }).length;
}
function getStageRanking(stage){
  const pl=Object.keys(USERS).filter(u=>!USERS[u].isAdmin);
  function countCorrectAtPosition(uid,pos){
    const actual=settings.groups||{};
    let count=0;
    for(const grp of Object.keys(GROUPS)){
      const a=(actual[grp]||[])[pos];
      const t=((preTips[uid]||{}).groups||{})[grp]&&((preTips[uid]||{}).groups||{})[grp][pos];
      if(a&&t&&a.toLowerCase()===t.toLowerCase())count++;
    }
    return count;
  }
  const scored=pl.map(u=>({
    uid:u,
    pts:stage==='pre'?getGroupPlacementPoints(u):getStageMatchPointsWithLive(u,stage),
    outcomes:stage==='pre'?0:countStageOutcomes(u,stage),
    exact:stage==='pre'?0:countStageExact(u,stage),
    pos1:stage==='pre'?countCorrectAtPosition(u,0):0,
    pos2:stage==='pre'?countCorrectAtPosition(u,1):0,
    pos3:stage==='pre'?countCorrectAtPosition(u,2):0,
    pos4:stage==='pre'?countCorrectAtPosition(u,3):0,
  })).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(stage==='pre'){
      if(b.pos1!==a.pos1)return b.pos1-a.pos1;
      if(b.pos2!==a.pos2)return b.pos2-a.pos2;
      if(b.pos3!==a.pos3)return b.pos3-a.pos3;
      return b.pos4-a.pos4;
    }
    if(b.outcomes!==a.outcomes)return b.outcomes-a.outcomes;
    return b.exact-a.exact;
  });
  return applySharedRanking(scored);
}

function renderMainLeaderboard(){
  const pl=Object.keys(USERS).filter(u=>!USERS[u].isAdmin);
  function countCorrectOutcomes(uid){
    return matches.filter(m=>{
      if(!m.result)return false;
      const t=(tips[m.id]||{})[uid];
      if(!t||t.home===''||t.away==='')return false;
      const[rh,ra]=m.result.split('-').map(Number);
      const th=t.home===''||t.home==null?0:parseInt(t.home);
      const ta=t.away===''||t.away==null?0:parseInt(t.away);
      if(isNaN(rh)||isNaN(ra)||isNaN(th)||isNaN(ta))return false;
      const rOut=rh>ra?'H':rh<ra?'A':'D',tOut=th>ta?'H':th<ta?'A':'D';
      return rOut===tOut;
    }).length;
  }
  function countExactResults(uid){
    return matches.filter(m=>{
      if(!m.result)return false;
      const t=(tips[m.id]||{})[uid];
      if(!t||t.home===''||t.away==='')return false;
      const[rh,ra]=m.result.split('-').map(Number);
      const th=parseInt(t.home),ta=parseInt(t.away);
      return th===rh&&ta===ra;
    }).length;
  }
  const ranked=pl.map(u=>({uid:u,name:USERS[u].name,mainPts:getMainLeaderboardPoints(u),tournBonus:getTournamentBonus(u),outcomes:countCorrectOutcomes(u),exact:countExactResults(u)})).sort((a,b)=>{
    if(b.mainPts!==a.mainPts)return b.mainPts-a.mainPts;
    if(b.outcomes!==a.outcomes)return b.outcomes-a.outcomes;
    return b.exact-a.exact;
  });
  const medals=['🥇','🥈','🥉'],rnk=['gold','silver','bronze'];
  let html='<div style="font-size:11px;color:var(--muted);margin-bottom:10px">Stage-ranking (1a=5p, 2a=4p...) + turneringsbonus</div>';
  html+=ranked.map((r,i)=>{

    const tbInfo=r.outcomes>0?r.outcomes+' rätt utfall · '+r.exact+' exakta':'';
    return`<div class="lb-row"><div class="lb-rank ${rnk[i]||''}">${medals[i]||i+1}</div><div style="flex:1"><div style="font-weight:500;font-size:14px">${r.name}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${tbInfo}</div></div><div style="text-align:right"><span class="lb-pts">${r.mainPts}</span><span style="font-size:11px;color:var(--muted)"> pts</span></div></div>`;
  }).join('');
  return html;
}

function openStagePlayerModal(uid,stage){

    for(const grp of Object.keys(GROUPS)){
      const a=actual[grp]||[],t=tg[grp]||[];
      for(let i=0;i<4;i++){if(a[i]&&t[i]&&a[i].toLowerCase()===t[i].toLowerCase()){total++;if(i===0)pos1++;else if(i===1)pos2++;else if(i===2)pos3++;else pos4++;}}

    html+='</div>';
  } else {
    let outcomeP=0,homeGoalP=0,awayGoalP=0,diffP=0,scorerP=0,firstTeamP=0,underdogP=0,x2P=0,goalP=0;
    for(const m of stageMatches){
      const t=(tips[m.id]||{})[uid];if(!t)continue;
      const pts=calcMatchPoints(m,t,tips[m.id]||{});
      const bd=pts.bd||[];
      // Calculate base points before booster
      let base=0;
      for(const b of bd){
        const n=parseInt((b.match(/\d+/)||['0'])[0])||0;
        if(b.startsWith('Rätt utfall')){outcomeP+=n;base+=n;}
        else if(b.startsWith('Hemmamål')){homeGoalP+=n;base+=n;}
        else if(b.startsWith('Bortamål')){awayGoalP+=n;base+=n;}

    const total=outcomeP+homeGoalP+awayGoalP+diffP+scorerP+firstTeamP+underdogP+x2P+goalP;

    html+='<div style="color:var(--muted)">Första lag</div><div style="font-weight:600">'+firstTeamP+'p</div>';
    if(underdogP>0)html+='<div style="color:var(--gold)">Underdog-bonus</div><div style="font-weight:600;color:var(--gold)">'+underdogP+'p</div>';
    if(x2P>0)html+='<div style="color:var(--gold)">⚡ 2X Booster</div><div style="font-weight:600;color:var(--gold)">+'+x2P+'p</div>';
    if(goalP>0)html+='<div style="color:var(--gold)">⚽ Goal Booster</div><div style="font-weight:600;color:var(--gold)">+'+goalP+'p</div>';
    html+='<div style="border-top:1px solid var(--border);padding-top:6px;font-weight:600;color:var(--muted)">Totalt</div><div style="font-weight:700;color:var(--accent);font-size:16px;border-top:1px solid var(--border);padding-top:6px">'+total+'p</div>';
    html+='</div>';
  }
  document.getElementById('matchModalContent').innerHTML=html;
  document.getElementById('matchModal').classList.add('show');
}

function toggleBooster(mid,type){
  const u=currentUser;if(!u)return;
  const tip=(tips[mid]||{})[u]||{};
  const newB=tip.booster===type?null:type;
  if(newB&&!canUseBooster(u,mid,activeTipStage,type))return;
  if(!tips[mid])tips[mid]={};
  // Save current input values before re-render
  const h=document.getElementById('h-'+mid);
  const a=document.getElementById('a-'+mid);
  const sc=document.getElementById('sc-'+mid);
  const ft=document.getElementById('ft-'+mid);
  const savedH=h?h.value:null;
  const savedA=a?a.value:null;
  const savedSc=sc?sc.value:null;
  const savedFt=ft?ft.value:null;
  tips[mid][u]=Object.assign({},tip,{
    booster:newB,
    home:savedH!==null?savedH:tip.home,
    away:savedA!==null?savedA:tip.away,
    scorer:savedSc!==null?savedSc:tip.scorer,
    first_team:savedFt!==null?savedFt:tip.first_team
  });
  refreshTipPage();
}
async function saveTip(mid){
  const u=currentUser;if(!u)return;
  // Check deadline
  const m=matches.find(x=>x.id===mid);
  if(!m||new Date()>=new Date(m.deadline.replace(' ','T')+'Z')){
    alert('⛔ Deadline har passerat! Tips kan inte sparas.');
    return;
  }
  const h=document.getElementById('h-'+mid),a=document.getElementById('a-'+mid);
  const sc=document.getElementById('sc-'+mid),ft=document.getElementById('ft-'+mid);
  const booster=(tips[mid]||{})[u]&&(tips[mid]||{})[u].booster||null;
  const{error}=await sb.from('tips').upsert({match_id:mid,user_id:u,home_score:h&&h.value!==''?parseInt(h.value):null,away_score:a&&a.value!==''?parseInt(a.value):null,scorer:sc?(sc.dataset.value||sc.value)||null:null,first_team:ft?ft.value||null:null,mom:null,booster},{onConflict:'match_id,user_id'});
  if(!error){await loadTips();const el=document.getElementById('saved-'+mid);if(el){el.style.display='block';setTimeout(()=>el.style.display='none',2500);}refreshMainLB();}
}
async function savePreBasic(){
  const u=currentUser;if(!u)return;
  if(vmHasStarted()){alert('⛔ Deadline har passerat! Turneringstips kan inte ändras.');return;}
  const w=document.getElementById('pre-winner'),s=document.getElementById('pre-scorer');
  const existing=preTips[u]||{};
  await sb.from('pre_tips').upsert({user_id:u,winner:w?w.value||null:null,topscorer:s?s.value||null:null,groups:JSON.stringify(existing.groups||{})},{onConflict:'user_id'});
  await loadPreTips();
  const el=document.getElementById('saved-pre-basic');if(el){el.style.display='block';setTimeout(()=>el.style.display='none',2000);}
}
async function autoSaveGroup(grp){
  const u=currentUser;if(!u)return;
  if(vmHasStarted()){alert('⛔ Deadline har passerat! Grupptips kan inte ändras.');return;}
  // Check for duplicates
  const placement=[];
  for(let i=0;i<4;i++){const el=document.getElementById('grp-'+grp+'-'+i);placement.push(el?el.value:'');}
  const chosen=placement.filter(v=>v!=='');
  const unique=new Set(chosen);
  if(unique.size<chosen.length){
    const errEl=document.getElementById('saved-grp-'+grp);
    if(errEl){errEl.style.color='var(--red)';errEl.textContent='⚠️ Samma lag valt flera gånger!';errEl.style.display='block';setTimeout(()=>{errEl.style.display='none';errEl.style.color='var(--green)';errEl.textContent='✓';},2500);}
    return;
  }
  const existing=preTips[u]||{};
  const groups=Object.assign({},existing.groups||{});groups[grp]=placement;
  await sb.from('pre_tips').upsert({user_id:u,winner:existing.winner||null,topscorer:existing.topscorer||null,groups:JSON.stringify(groups)},{onConflict:'user_id'});
  await loadPreTips();
  const el=document.getElementById('saved-grp-'+grp);
  if(el){el.style.color='var(--green)';el.textContent='✓';el.style.display='block';setTimeout(()=>el.style.display='none',1500);}
}
async function finalizeStage(stage){
  if(!confirm('Avsluta '+STAGE_LABELS[stage]+'? Kan ej ångras.'))return;
  const ranking=getStageRanking(stage);const stageBonus={};
  for(const r of ranking)stageBonus[r.uid]=r.bonus;
  const newSP=Object.assign({},stagePoints);newSP[stage]=stageBonus;
  await sb.from('settings').upsert({key:'stage_points',value:JSON.stringify(newSP)},{onConflict:'key'});
  stagePoints=newSP;refreshAll();
}

      html+='<div style="display:grid;grid-template-columns:1fr 38px 38px 38px 38px 38px;gap:3px;margin-bottom:3px;align-items:center">';
      html+='<select class="admin-input" id="gs-'+grp+'-'+i+'-team" style="padding:3px 5px;font-size:11px">';
      for(const t of teams)html+='<option value="'+t+'" '+(r.team===t?'selected':'')+'>'+t+'</option>';
      html+='</select>';
      for(const f of['p','w','d','l','pts'])html+='<input class="admin-input" type="number" min="0" id="gs-'+grp+'-'+i+'-'+f+'" value="'+(r[f]||0)+'" style="width:100%;padding:3px;text-align:center;font-size:12px'+(f==='pts'?';color:var(--accent)':'')+'">';
      html+='</div>';
    }
    html+='<button class="admin-btn" style="margin-top:4px" onclick="adminSaveGroupStandings(\''+grp+'\')">Spara Grupp '+grp+'</button>';
    html+='<div id="gs-saved-'+grp+'" class="saved-badge" style="display:none">✓</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

  await loadMatches();refreshCurrentPage();
}
async function adminClearLive(mid){
  await sb.from('matches').update({live_score:null,live_scorer:null,live_first_team:null}).eq('id',mid);
  await loadMatches();refreshCurrentPage();
}
async function updateNextRound(mid, winner) {
  // Full bracket: R32->R16->QF->SF->Final
  const bracket = {
    // R32 -> R16
    "r32_01":["r16_01","home"], "r32_04":["r16_01","away"],
    "r32_03":["r16_02","home"], "r32_06":["r16_02","away"],
    "r32_02":["r16_03","home"], "r32_05":["r16_03","away"],
    "r32_07":["r16_04","home"], "r32_09":["r16_04","away"],
    "r32_10":["r16_05","home"], "r32_13":["r16_05","away"],
    "r32_11":["r16_06","home"], "r32_12":["r16_06","away"],
    "r32_08":["r16_07","home"], "r32_16":["r16_07","away"],
    "r32_14":["r16_08","home"], "r32_15":["r16_08","away"],
    // R16 -> QF
    "r16_01":["qf_01","home"], "r16_02":["qf_01","away"],
    "r16_03":["qf_02","home"], "r16_04":["qf_02","away"],
    "r16_05":["qf_03","home"], "r16_06":["qf_03","away"],
    "r16_07":["qf_04","home"], "r16_08":["qf_04","away"],
    // QF -> SF
    "qf_01":["sf_01","home"], "qf_02":["sf_01","away"],
    "qf_03":["sf_02","home"], "qf_04":["sf_02","away"],
    // SF -> Final
    "sf_01":["fin","home"], "sf_02":["fin","away"],
  };
  if(!bracket[mid]) return;
  const [nextId, side] = bracket[mid];
  const update = side==='home' ? {home: winner} : {away: winner};
  await sb.from('matches').update(update).eq('id', nextId);
  await loadMatches();
  refreshAll();
}
async function adminSetResult(mid){
  const r=document.getElementById('res-'+mid),ps=document.getElementById('psc-'+mid),pf=document.getElementById('pft-'+mid);
  const res=r?r.value||null:null;
  await sb.from('matches').update({result:res,live_score:null,live_scorer:null,live_first_team:null,pot_scorer:ps?ps.value||null:null,pot_first_team:pf?pf.value||null:null,pot_mom:null}).eq('id',mid);
  await loadMatches();
  // Auto-update next round with winner
  if(res&&(mid.startsWith('r32_')||mid.startsWith('r16_')||mid.startsWith('qf_')||mid.startsWith('sf_'))){
    const m=matches.find(x=>x.id===mid);
    if(m){
      const[rh,ra]=res.split('-').map(Number);
      const winner=rh>=ra?m.home:m.away;
      await updateNextRound(mid,winner);
    }
  }
  refreshAll();
}
async function adminClearResult(mid){
  await sb.from('matches').update({result:null,live_score:null,live_scorer:null,live_first_team:null,pot_scorer:null,pot_first_team:null,pot_mom:null}).eq('id',mid);
  await loadMatches();refreshAll();
}

async function adminSaveGroups(){

async function adminSaveGroupStandings(grp){
  const gs=settings.current_standings||{};const rows=[];
  for(let i=0;i<4;i++){
    const team=document.getElementById('gs-'+grp+'-'+i+'-team');
    const vals={};for(const f of['p','w','d','l','pts']){const el=document.getElementById('gs-'+grp+'-'+i+'-'+f);vals[f]=parseInt(el&&el.value)||0;}
    rows.push(Object.assign({team:team?team.value:''},vals));
  }
  gs[grp]=rows;settings.current_standings=gs;
  await sb.from('settings').upsert({key:'current_standings',value:JSON.stringify(gs)},{onConflict:'key'});
  const el=document.getElementById('gs-saved-'+grp);if(el){el.style.display='block';setTimeout(()=>el.style.display='none',1500);}

}
function unlockStage(stage){
  const labels={r32:'R32',r16:'R16',qf:'Kvart',sf:'Semi',final:'Final'};

  if(!USERS[u]||USERS[u].pw!==p){err.style.display='block';return;}

function updateAuthUI(){
  const area=document.getElementById('authArea'),at=document.getElementById('adminTab'),tt=document.getElementById('tipTab'),pt=document.getElementById('pretipTab');
  if(!currentUser){
    area.innerHTML='<button class="login-btn" onclick="openLogin()">Logga in</button>';

  if(btn)btn.classList.add('active');

function setPreSub(sub,btn){

function toSthlm(dtStr){
  if(!dtStr)return'–';
  // Normalize: replace space with T, ensure UTC marker
  let s=dtStr.trim().replace(' ','T');
  // Remove timezone suffix like +00, +00:00, +0000 and treat as UTC
  s=s.replace(/[+-]\d{2}:?\d{0,2}$/, '').replace(/Z$/,'');
  s+='Z'; // always treat as UTC
  const d=new Date(s);
  if(isNaN(d.getTime()))return dtStr;
  return d.toLocaleString('sv-SE',{timeZone:'Europe/Stockholm',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(',','');
}
function updateClock(){
  const now=new Date();
  const sthlm=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Stockholm'}));
  const h=String(sthlm.getHours()).padStart(2,'0');
  const m=String(sthlm.getMinutes()).padStart(2,'0');
  const s=String(sthlm.getSeconds()).padStart(2,'0');
  const el=document.getElementById('clockTime');
  if(el)el.textContent=h+':'+m+':'+s;
}
